<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prediction Engine</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#071120;
color:white;
padding:40px;
}

.container{
max-width:1200px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:40px;
font-size:50px;
}

form{
background:#102341;
padding:40px;
border-radius:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}

.form-group{
display:flex;
flex-direction:column;
}

label{
margin-bottom:8px;
font-weight:bold;
}

select,
input{

padding:12px;
border:none;
border-radius:10px;
font-size:16px;
}

.button-box{
text-align:center;
margin-top:40px;
}

button{

padding:18px 50px;
background:#2f80ff;
color:white;
border:none;
border-radius:12px;
font-size:20px;
cursor:pointer;
}

button:hover{
background:#1f6de0;
}

</style>

</head>

<body>

<div class="container">

<h1>
Customer Churn Prediction Engine
</h1>

<form action="/predict" method="POST">

<div class="grid">

<div class="form-group">
<label>Gender</label>
<select name="gender">
<option>Male</option>
<option>Female</option>
</select>
</div>

<div class="form-group">
<label>Senior Citizen</label>
<select name="senior_citizen">
<option>No</option>
<option>Yes</option>
</select>
</div>

<div class="form-group">
<label>Partner</label>
<select name="partner">
<option>No</option>
<option>Yes</option>
</select>
</div>

<div class="form-group">
<label>Dependents</label>
<select name="dependents">
<option>No</option>
<option>Yes</option>
</select>
</div>

<div class="form-group">
<label>Phone Service</label>
<select name="phone_service">
<option>No</option>
<option>Yes</option>
</select>
</div>

<div class="form-group">
<label>Multiple Lines</label>
<select name="multiple_lines">
<option>No</option>
<option>Yes</option>
<option>No phone service</option>
</select>
</div>

<div class="form-group">
<label>Internet Service</label>
<select name="internet_service">
<option>DSL</option>
<option>Fiber optic</option>
<option>No</option>
</select>
</div>

<div class="form-group">
<label>Online Security</label>
<select name="online_security">
<option>No</option>
<option>Yes</option>
<option>No internet service</option>
</select>
</div>

<div class="form-group">
<label>Online Backup</label>
<select name="online_backup">
<option>No</option>
<option>Yes</option>
<option>No internet service</option>
</select>
</div>

<div class="form-group">
<label>Device Protection</label>
<select name="device_protection">
<option>No</option>
<option>Yes</option>
<option>No internet service</option>
</select>
</div>

<div class="form-group">
<label>Tech Support</label>
<select name="tech_support">
<option>No</option>
<option>Yes</option>
<option>No internet service</option>
</select>
</div>

<div class="form-group">
<label>Streaming TV</label>
<select name="streaming_tv">
<option>No</option>
<option>Yes</option>
<option>No internet service</option>
</select>
</div>

<div class="form-group">
<label>Streaming Movies</label>
<select name="streaming_movies">
<option>No</option>
<option>Yes</option>
<option>No internet service</option>
</select>
</div>

<div class="form-group">
<label>Contract</label>
<select name="contract">
<option>Month-to-month</option>
<option>One year</option>
<option>Two year</option>
</select>
</div>

<div class="form-group">
<label>Paperless Billing</label>
<select name="paperless_billing">
<option>No</option>
<option>Yes</option>
</select>
</div>

<div class="form-group">
<label>Payment Method</label>
<select name="payment_method">
<option>Electronic check</option>
<option>Mailed check</option>
<option>Bank transfer (automatic)</option>
<option>Credit card (automatic)</option>
</select>
</div>

<div class="form-group">
<label>Tenure Months</label>
<input
type="number"
name="tenure_months"
required>
</div>

<div class="form-group">
<label>Monthly Charges</label>
<input
type="number"
step="0.01"
name="monthly_charges"
required>
</div>

<div class="form-group">
<label>Total Charges</label>
<input
type="number"
step="0.01"
name="total_charges"
required>
</div>

<div class="form-group">
<label>CLTV</label>
<input
type="number"
name="cltv"
required>
</div>

</div>

<div class="button-box">

<button type="submit">

Predict Customer Churn

</button>

</div>

</form>

</div>

</body>

</html>
